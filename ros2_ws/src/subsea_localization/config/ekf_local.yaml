ekf_local:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.15
    two_d_mode: false
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Primary local estimate: IMU + optional wheel/visual odom.
    odom0: /odometry/wheel
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  true,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_nodelay: true
    odom0_differential: false
    odom0_relative: false

    imu0: /imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  true]
    imu0_nodelay: true
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 20
    imu0_remove_gravitational_acceleration: true

    use_control: false
    stamped_control: false
    permit_corrected_publication: true
